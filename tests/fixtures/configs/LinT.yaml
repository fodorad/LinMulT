# input params
input_feature_dim: 41

special_handling:
  wavlm_baseplus:
    type: weighted_sum
    start_layer: 6
    end_layer: 12

# CMT transformer params
d_model: 40
num_heads: 8
cmt_num_layers: 6
attention_type: linear # bigbird, softmax, mha

## bigbird attention params - ignored otherwise
# bigbird_block_size: 64
# bigbird_num_global_tokens: 16
# bigbird_num_random_tokens: 10
# dropout_attention: 0.

dropout_input: 0
dropout_ffn: 0.1
dropout_output: 0

# LinMult task-specific output heads
heads:
  - type: sequence_aggregation
    norm: bn
    pooling: gap
    hidden_dim: 256
    dropout: 0.1
    output_dim: 7
  - type: sequence
    norm: bn
    hidden_dim: 256
    dropout: 0.1
    output_dim: 2
